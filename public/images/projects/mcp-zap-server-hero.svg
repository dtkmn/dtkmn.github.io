<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-labelledby="title desc">
  <title id="title">MCP ZAP Server editorial hero</title>
  <desc id="desc">A technical illustration showing an AI agent, MCP gateway, ZAP engine, and scan findings panels connected in a secure orchestration flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1319"/>
      <stop offset="60%" stop-color="#111a23"/>
      <stop offset="100%" stop-color="#091017"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientTransform="translate(340 260) rotate(24) scale(520 420)">
      <stop offset="0%" stop-color="#71d3c6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#71d3c6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientTransform="translate(1180 220) rotate(-12) scale(420 360)">
      <stop offset="0%" stop-color="#b9fff5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b9fff5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2430" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#0d141c" stop-opacity="0.94"/>
