    </linearGradient>
    <linearGradient id="riskHigh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6d5e"/>
      <stop offset="100%" stop-color="#ffb08d"/>
    </linearGradient>
    <linearGradient id="riskMed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffbd5a"/>
      <stop offset="100%" stop-color="#ffe3a6"/>
    </linearGradient>
    <linearGradient id="riskLow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#72d8cb"/>
      <stop offset="100%" stop-color="#d7fff9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
