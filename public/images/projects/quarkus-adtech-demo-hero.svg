      <rect x="26" y="106" width="258" height="18" rx="9" fill="url(#accentTeal)"/>
      <rect x="26" y="144" width="318" height="18" rx="9" fill="url(#accentAmber)"/>
      <rect x="26" y="182" width="204" height="18" rx="9" fill="#d7fff9" fill-opacity="0.22"/>
    </g>
  </g>

  <g>
    <text x="632" y="282" fill="#71d3c6" font-family="'IBM Plex Sans', sans-serif" font-size="20" letter-spacing="4">RECEIVER LAYERS</text>
    <g transform="translate(632 332)">
      <rect width="240" height="82" rx="22" fill="#101822" stroke="#71d3c6" stroke-opacity="0.18"/>
      <text x="26" y="48" fill="#f8f6f0" font-family="'IBM Plex Mono', monospace" font-size="28">JVM</text>
      <rect x="122" y="30" width="86" height="20" rx="10" fill="url(#accentBlue)"/>
    </g>
    <g transform="translate(632 436)">
      <rect width="240" height="82" rx="22" fill="#101822" stroke="#71d3c6" stroke-opacity="0.18"/>
      <text x="26" y="48" fill="#f8f6f0" font-family="'IBM Plex Mono', monospace" font-size="28">NATIVE</text>
      <rect x="122" y="30" width="92" height="20" rx="10" fill="url(#accentTeal)"/>
    </g>
    <g transform="translate(632 540)">
