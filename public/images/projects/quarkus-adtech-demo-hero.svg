      <text x="26" y="48" fill="#f8f6f0" font-family="'IBM Plex Mono', monospace" font-size="28">RUST</text>
      <rect x="122" y="30" width="78" height="20" rx="10" fill="#d7fff9" fill-opacity="0.22"/>
    </g>
  </g>

  <g>
    <text x="1008" y="200" fill="#71d3c6" font-family="'IBM Plex Sans', sans-serif" font-size="20" letter-spacing="4">EVENT BACKBONE</text>
    <rect x="1008" y="232" width="432" height="84" rx="22" fill="#101822" stroke="#71d3c6" stroke-opacity="0.16"/>
    <text x="1040" y="284" fill="#f8f6f0" font-family="'IBM Plex Mono', monospace" font-size="36">KAFKA</text>
    <path d="M1184 274h190" fill="none" stroke="url(#accentTeal)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="1388" cy="274" r="9" fill="#d7fff9"/>

    <rect x="1008" y="338" width="202" height="78" rx="20" fill="#101822" stroke="#71d3c6" stroke-opacity="0.14"/>
    <rect x="1238" y="338" width="202" height="78" rx="20" fill="#101822" stroke="#71d3c6" stroke-opacity="0.14"/>
    <rect x="1038" y="368" width="112" height="14" rx="7" fill="url(#accentBlue)"/>
    <rect x="1268" y="368" width="122" height="14" rx="7" fill="url(#accentAmber)"/>
