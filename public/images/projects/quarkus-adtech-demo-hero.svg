<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-labelledby="title desc">
  <title id="title">Quarkus AdTech Demo editorial hero</title>
  <desc id="desc">A technical illustration of a low-latency bid receiver architecture with traffic entering runtime lanes, Kafka, observability, and performance metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1319"/>
      <stop offset="50%" stop-color="#121c26"/>
      <stop offset="100%" stop-color="#091017"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientTransform="translate(290 250) rotate(18) scale(460 360)">
      <stop offset="0%" stop-color="#6db4ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6db4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0" cy="0" r="1" gradientTransform="translate(1080 420) rotate(-10) scale(560 420)">
      <stop offset="0%" stop-color="#71d3c6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#71d3c6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18222c" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d141c" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6db4ff"/>
      <stop offset="100%" stop-color="#b8d8ff"/>
    </linearGradient>
    <linearGradient id="accentTeal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#71d3c6"/>
      <stop offset="100%" stop-color="#d7fff9"/>
    </linearGradient>
    <linearGradient id="accentAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb04f"/>
      <stop offset="100%" stop-color="#ffe2af"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#030507" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#d7fff9" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1600" height="1067" fill="url(#bg)"/>
  <rect width="1600" height="1067" fill="url(#grid)"/>
  <rect width="1600" height="1067" fill="url(#glowBlue)"/>
  <rect width="1600" height="1067" fill="url(#glowTeal)"/>

  <g opacity="0.4">
    <path d="M90 796C234 756 392 724 580 690C722 664 862 630 1032 558C1170 500 1322 382 1520 198" fill="none" stroke="#6db4ff" stroke-opacity="0.18" stroke-width="3"/>
    <path d="M72 862C304 778 456 746 640 700C790 662 928 620 1078 554C1254 476 1386 344 1528 224" fill="none" stroke="#71d3c6" stroke-opacity="0.12" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="164" width="430" height="690" rx="34" fill="url(#panel)" stroke="#6db4ff" stroke-opacity="0.16"/>
    <rect x="590" y="228" width="326" height="564" rx="32" fill="url(#panel)" stroke="#71d3c6" stroke-opacity="0.18"/>
