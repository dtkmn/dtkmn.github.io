    <path d="M1070 742c28-36 56-42 82-86c16-26 28-66 56-66c30 0 34 62 62 62c30 0 38-54 72-90" fill="none" stroke="url(#accentTeal)" stroke-width="6" stroke-linecap="round"/>
    <path d="M1070 712c22-16 48-20 76-52c26-30 38-62 66-62c28 0 42 38 72 38c28 0 46-30 98-82" fill="none" stroke="url(#accentBlue)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <g transform="translate(1062 606)">
      <rect width="132" height="14" rx="7" fill="#d7fff9" fill-opacity="0.76"/>
      <rect x="0" y="28" width="102" height="10" rx="5" fill="#8ea099" fill-opacity="0.28"/>
    </g>
  </g>

  <g opacity="0.95">
    <path d="M540 508C576 508 588 508 612 488" fill="none" stroke="url(#accentBlue)" stroke-width="6" stroke-linecap="round"/>
    <path d="M540 612C584 612 594 612 620 592" fill="none" stroke="url(#accentTeal)" stroke-width="6" stroke-linecap="round"/>
