    <text x="154" y="284" fill="#f8f6f0" font-family="'Newsreader', serif" font-size="60">Low-latency</text>
    <text x="154" y="338" fill="#f8f6f0" font-family="'Newsreader', serif" font-size="60">runtime study</text>
    <text x="154" y="388" fill="#d8ddd5" font-family="'IBM Plex Sans', sans-serif" font-size="24">Bid requests, instant startup, sustained throughput.</text>

    <g transform="translate(154 454)">
      <rect width="342" height="72" rx="18" fill="#101822" stroke="#6db4ff" stroke-opacity="0.22"/>
      <rect x="24" y="24" width="82" height="24" rx="12" fill="url(#accentBlue)"/>
      <rect x="132" y="24" width="88" height="24" rx="12" fill="#d7fff9" fill-opacity="0.22"/>
      <rect x="246" y="24" width="72" height="24" rx="12" fill="#d7fff9" fill-opacity="0.12"/>
